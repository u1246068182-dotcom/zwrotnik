name: Reminders

on:
  schedule:
    - cron: "0 * * * *" # co godzinę
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Wywołaj endpoint wysyłki przypomnień
        run: |
          # Origin pasujący do hosta — spełnia CSRF checkOrigin Astro (realną ochroną jest CRON_SECRET).
          curl -sS -f -X POST "https://mojzwrotnik.uk/api/cron/send-reminders" \
            -H "Origin: https://mojzwrotnik.uk" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
